<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>W7 주교재 7장 기억과 훈련 - 김형모</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --card: #1e2a4a;
      --text: #d4d4d8;
      --heading: #ffffff;
      --accent: #6c63ff;
      --accent2: #e94560;
      --accent-soft: #a8a4ff;
      --highlight-bg: rgba(108,99,255,0.15);
      --code-bg: #0f3460;
      --border: #333;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    .progress-bar {
      position: fixed; top: 0; left: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%; transition: width 0.1s; z-index: 1000;
    }

    body { background: var(--bg); color: var(--text); font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; line-height: 1.75; }

    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(26,26,46,0.95); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0.55rem 1.2rem; display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center;
    }
    .nav-label { color: var(--accent-soft); font-size: 0.75rem; font-weight: 600; margin-right: 0.3rem; }
    .nav a {
      color: #888; font-size: 0.72rem; text-decoration: none;
      padding: 0.2rem 0.6rem; border-radius: 4px; white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .nav a:hover { background: var(--highlight-bg); color: var(--accent-soft); }
    .nav a.active { background: var(--accent); color: #fff; font-weight: 600; }

    .container { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* ─── Prequiz Card ─── */
    .prequiz-card {
      background: linear-gradient(135deg, #1e2a4a 0%, #16213e 100%);
      border: 1px solid var(--accent);
      border-radius: 12px; padding: 1.6rem 1.8rem; margin-bottom: 2.5rem;
    }
    .prequiz-card h2 {
      color: var(--accent-soft); font-size: 1rem; text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 0.4rem;
    }
    .prequiz-card .prequiz-guide {
      color: #aaa; font-size: 0.85rem; margin-bottom: 1.4rem; line-height: 1.5;
    }
    .prequiz-card h3 { color: var(--heading); font-size: 1.1rem; margin: 1.2rem 0 0.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
    .prequiz-card h4 { color: var(--accent-soft); font-size: 0.95rem; margin: 1.2rem 0 0.5rem; }
    .prequiz-card p { font-size: 0.88rem; margin-bottom: 0.7rem; }
    .prequiz-card ul, .prequiz-card ol { padding-left: 1.4rem; font-size: 0.88rem; margin-bottom: 0.7rem; }
    .prequiz-card li { margin-bottom: 0.3rem; }
    .prequiz-card pre { background: var(--code-bg); border-radius: 6px; padding: 0.8rem 1rem; overflow-x: auto; font-size: 0.8rem; margin: 0.6rem 0; }
    .prequiz-card code { font-family: 'Fira Code', monospace; }
    .prequiz-card hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

    details {
      background: rgba(108,99,255,0.08); border: 1px solid rgba(108,99,255,0.3);
      border-radius: 8px; padding: 0.6rem 1rem; margin: 0.6rem 0;
    }
    details summary {
      cursor: pointer; color: var(--accent-soft); font-size: 0.85rem; font-weight: 600;
      list-style: none; padding: 0.2rem 0; user-select: none;
    }
    details summary::before { content: '▶ '; font-size: 0.7rem; }
    details[open] summary::before { content: '▼ '; }
    details p, details ul, details li { font-size: 0.85rem; margin-top: 0.5rem; }

    /* ─── Main Content ─── */
    #content h1 { color: var(--heading); font-size: 1.9rem; margin-bottom: 0.5rem; }
    #content h2 { color: var(--accent-soft); font-size: 1.4rem; margin: 2.2rem 0 0.8rem; padding-bottom: 0.4rem; border-bottom: 2px solid var(--accent); }
    #content h3 { color: var(--heading); font-size: 1.15rem; margin: 1.8rem 0 0.6rem; }
    #content h4 { color: var(--accent-soft); font-size: 1rem; margin: 1.4rem 0 0.5rem; }
    #content p { margin-bottom: 1rem; }
    #content ul, #content ol { padding-left: 1.5rem; margin-bottom: 1rem; }
    #content li { margin-bottom: 0.3rem; }
    #content blockquote {
      border-left: 3px solid var(--accent); margin: 1.2rem 0;
      padding: 0.6rem 1rem; background: var(--highlight-bg); border-radius: 0 6px 6px 0;
      color: #bbb;
    }
    #content code { background: var(--code-bg); padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.88em; font-family: 'Fira Code', monospace; }
    #content pre { background: var(--code-bg); border-radius: 8px; padding: 1rem 1.2rem; overflow-x: auto; margin: 1rem 0; }
    #content pre code { background: none; padding: 0; }
    #content hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    #content table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.9rem; }
    #content th { background: var(--card); color: var(--accent-soft); padding: 0.6rem 0.8rem; text-align: left; border-bottom: 2px solid var(--accent); }
    #content td { padding: 0.5rem 0.8rem; border-bottom: 1px solid var(--border); }
    #content tr:hover td { background: rgba(108,99,255,0.07); }
    #content img { max-width: 100%; border-radius: 8px; margin: 1rem 0; cursor: zoom-in; }
    #content strong { color: #e0dfff; }

    /* TOC */
    .toc { background: var(--card); border-radius: 8px; padding: 1.2rem 1.5rem; margin-bottom: 2rem; font-size: 0.85rem; }
    .toc-title { color: var(--accent-soft); font-weight: 700; margin-bottom: 0.8rem; }
    .toc a { color: #999; text-decoration: none; display: block; padding: 0.15rem 0; }
    .toc a:hover { color: var(--accent-soft); }
    .toc-h3 { padding-left: 1rem; }

    /* Lightbox */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
    .lightbox.active { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
    .lightbox-close { position: absolute; top: 1.5rem; right: 2rem; color: #fff; font-size: 2rem; cursor: pointer; }

    .loading { text-align: center; color: #666; padding: 3rem; }

    @media (max-width: 600px) {
      .container { padding: 1rem 1rem 3rem; }
      #content h2 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="progress-bar" id="progressBar"></div>

  <nav class="nav">
    <span class="nav-label">인지공학심리학 |</span>
    <a href="../w3-reports/prompt.html">프롬프트</a>
    <a href="../w3-reports/index.html">W3 주교재 2장</a>
    <a href="../w3-reports/sub-chapter8.html">W3 부교재 8장</a>

    <a href="../w5-reports/index.html">W5 주교재 4장</a>
    <a href="../w5-reports/sub-laws-ux-ch2.html">W5 부교재 Laws of UX 2장</a>
    <a href="../w6-reports/index.html">W6 주교재 5장</a>
    <a href="../w6-reports/w6-chapter6.html">W6 주교재 6장</a>
    <a href="../w6-reports/w6-sub-laws-ux-ch5.html">W6 부교재 Laws of UX 5장</a>
    <a href="index.html" class="active">W7 주교재 7장 🧠</a>
  </nav>

  <div class="container">
    <div class="prequiz-card" id="prequizCard" style="display:none;">
      <h2>🎯 Pre-Quiz — 먼저 풀어보세요</h2>
      <p class="prequiz-guide">본문을 읽기 전에 먼저 머릿속으로 답해보세요. 틀려도 괜찮습니다 — 모르는 채로 질문을 만나야 본문이 훨씬 잘 박힙니다.</p>
      <div id="prequizContent"></div>
    </div>
    <div id="tocContainer"></div>
    <div id="content"><div class="loading">Loading...</div></div>
  </div>

  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightboxClose">&times;</span>
    <img id="lightboxImg" src="" alt="">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script>
    marked.setOptions({ breaks: true, gfm: true });

    async function main() {
      try {
        const resp = await fetch('w7-chapter7.md');
        if (!resp.ok) throw new Error('md fetch failed: ' + resp.status);
        const md = await resp.text();
        document.getElementById('content').innerHTML = marked.parse(md);
        transformPrequiz();
        buildToc();
        renderMath();
        setupLightbox();
        setupProgress();
      } catch (e) {
        document.getElementById('content').innerHTML = '<p style="color:#e94560">로드 실패: ' + e.message + '</p>';
      }
    }

    function transformPrequiz() {
      const content = document.getElementById('content');

      // 1. 퀴즈 흐름도 h3 찾기 (프리퀴즈에 포함)
      let flowH3 = null, quizH3 = null;
      content.querySelectorAll('h3').forEach(h => {
        if (h.textContent.includes('퀴즈 흐름도')) flowH3 = h;
        if (h.textContent.includes('사고력 중심 리뷰 퀴즈')) quizH3 = h;
      });
      if (!quizH3) return;

      // 2. 시작 노드: 흐름도 h3가 있으면 그 앞 hr부터, 없으면 퀴즈 h3부터
      const startNode = flowH3 || quizH3;

      // startNode 바로 앞 hr 제거 (섹션 구분선)
      const prevSibling = startNode.previousElementSibling;
      if (prevSibling && prevSibling.tagName === 'HR') prevSibling.remove();

      // 3. startNode부터 siblings 수집 (퀴즈 외 보충 텍스트 제외)
      const quizNodes = [];
      let node = startNode;
      let h4Count = 0;
      let afterLastAnswer = false;

      while (node) {
        if (node.tagName === 'H4') {
          h4Count++;
          afterLastAnswer = false;
        }
        // 마지막 문제 정답 ul 이후 strong 없는 긴 단락 = 보충 텍스트 → 중단
        if (h4Count >= 5 && afterLastAnswer &&
            node.tagName === 'P' && !node.querySelector('strong') &&
            node.textContent.trim().length > 60) {
          break;
        }
        // 정답 ul 이후 플래그
        if (node.tagName === 'P') {
          const s = node.querySelector('strong');
          if (s && s.textContent.includes('[정답 및 해설]')) afterLastAnswer = true;
        }
        if (node.tagName === 'UL' && afterLastAnswer) afterLastAnswer = true;

        quizNodes.push(node);
        node = node.nextElementSibling;
      }

      if (quizNodes.length === 0) return;

      // 4. 정답 sections → <details> 래핑
      const fragment = document.createDocumentFragment();
      quizNodes.forEach(n => fragment.appendChild(n));

      fragment.querySelectorAll('p').forEach(p => {
        const s = p.querySelector('strong');
        if (!s || !s.textContent.includes('[정답 및 해설]')) return;

        const details = document.createElement('details');
        const summary = document.createElement('summary');
        summary.textContent = '💡 정답 & 해설 보기';
        details.appendChild(summary);

        const parent = p.parentNode;
        if (!parent) return;
        parent.insertBefore(details, p);
        details.appendChild(p);

        // 이후 형제들 (h4 또는 hr 전까지)을 details 안으로
        let sibling = details.nextElementSibling;
        while (sibling && sibling.tagName !== 'H4' && sibling.tagName !== 'HR' && sibling.tagName !== 'H3') {
          const toMove = sibling;
          sibling = sibling.nextElementSibling;
          details.appendChild(toMove);
        }
      });

      // 5. 프리퀴즈 카드에 삽입
      const prequizContent = document.getElementById('prequizContent');
      prequizContent.appendChild(fragment);
      document.getElementById('prequizCard').style.display = 'block';
    }

    function buildToc() {
      const content = document.getElementById('content');
      const headings = content.querySelectorAll('h2, h3');
      if (headings.length < 3) return;

      const toc = document.createElement('div');
      toc.className = 'toc';
      toc.innerHTML = '<div class="toc-title">📋 목차</div>';
      headings.forEach((h, i) => {
        const id = 'heading-' + i;
        h.id = id;
        const a = document.createElement('a');
        a.href = '#' + id;
        a.textContent = h.textContent;
        a.className = h.tagName === 'H3' ? 'toc-h3' : '';
        toc.appendChild(a);
      });
      document.getElementById('tocContainer').appendChild(toc);
    }

    function renderMath() {
      renderMathInElement(document.getElementById('content'), {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false }
        ],
        throwOnError: false
      });
    }

    function setupLightbox() {
      const lb = document.getElementById('lightbox');
      const lbImg = document.getElementById('lightboxImg');
      document.getElementById('lightboxClose').onclick = () => lb.classList.remove('active');
      lb.onclick = (e) => { if (e.target === lb) lb.classList.remove('active'); };
      document.getElementById('content').querySelectorAll('img').forEach(img => {
        img.onclick = () => { lbImg.src = img.src; lb.classList.add('active'); };
      });
    }

    function setupProgress() {
      const bar = document.getElementById('progressBar');
      window.addEventListener('scroll', () => {
        const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
        bar.style.width = Math.min(pct, 100) + '%';
      });
    }

    main();
  </script>
</body>
